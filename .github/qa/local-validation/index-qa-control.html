<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CaaS QA · Control (baseline cards)</title>
<link rel="stylesheet" href="../../../dist/app.css">
<style>body { margin: 0; font-family: adobe-clean, sans-serif; }</style>
</head>
<body class="page basicpage spectrum spectrum--lightest">
<div class="root responsivegrid">
<div class="aem-Grid aem-Grid--12 aem-Grid--default--12">
<div class="cardcollection aem-GridColumn aem-GridColumn--default--12">
<section id="caas-qa-root" class="consonant"></section>
</div></div></div>
<script src="../../../dist/main.min.js"></script>
<script>
(async () => {
  const e2e = await fetch('../../../e2e-tests/config.json').then(r => r.json());
  const config = JSON.parse(JSON.stringify(e2e));
  config.collection.endpoint = window.location.origin + '/mock-json/smoke.json';
  config.collection.lazyLoad = false;
  config.filterPanel.enabled = 'true';
  config.filterPanel.type = 'left';
  if (Array.isArray(config.filterPanel.filters) && config.filterPanel.filters[0]) {
    config.filterPanel.filters[0].openedOnLoad = true;
  }
  config.search = config.search || {}; config.search.enabled = 'true';
  config.sort = config.sort || { enabled: 'true', defaultSort: 'titleAsc',
    options: [{sort:'random',label:'Random'},{sort:'dateAsc',label:'Date oldest first'},{sort:'dateDesc',label:'Date newest first'},{sort:'titleAsc',label:'Title A-Z'}] };
  config.pagination = config.pagination || { enabled: 'true', type: 'paginator',
    i18n: { paginator: {prevLabel:'Previous',nextLabel:'Next',resultsQuantityText:'{total} Results',pagination:'Pagination'},
            loadMore: {btnText:'Load more',resultsQuantityText:'{total} Results'} } };
  config.language = { country: 'ch', lang: 'en' };
  new window.ConsonantCardCollection(config, document.getElementById('caas-qa-root'));
})();
</script>
</body></html>
