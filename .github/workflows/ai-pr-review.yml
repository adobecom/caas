name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_diff.txt

      - name: AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, subprocess

          with open("pr_diff.txt", "r") as f:
              diff = f.read()[:12000]

          payload = {
              "model": "gpt-4o",
              "max_tokens": 1500,
              "messages": [
                  {
                      "role": "system",
                      "content": "You are an expert code reviewer. Review the following PR diff and provide concise, constructive feedback. Focus on: bugs, security issues, performance, code style, and best practices. Format your response in markdown with clear sections."
                  },
                  {
                      "role": "user",
                      "content": f"Please review this PR diff:\n\n{diff}"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}"
              }
          )

          with urllib.request.urlopen(req) as res:
              result = json.loads(res.read())

          review = result["choices"][0]["message"]["content"]

          body = f"## U0001f916 AI Code Review\n\n{review}\n\n---\n*This PR was automatically reviewed by an AI assistant.*"

          with open("comment.txt", "w") as f:
              f.write(body)

          EOF

          gh pr comment $PR_NUMBER \
            --repo $REPO \
            --body-file comment.txt
