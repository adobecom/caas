name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get PR diff
        id: diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF"
          git diff "origin/$BASE_REF...HEAD" > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error

          api_key = os.environ.get("OPENAI_API_KEY")
          if not api_key:
              print("OPENAI_API_KEY not set", file=sys.stderr)
              sys.exit(1)

          with open("/tmp/pr.diff", "r", encoding="utf-8", errors="replace") as f:
              diff = f.read()

          MAX_DIFF_CHARS = 60000
          truncated = False
          if len(diff) > MAX_DIFF_CHARS:
              diff = diff[:MAX_DIFF_CHARS]
              truncated = True

          if not diff.strip():
              with open("/tmp/review.md", "w", encoding="utf-8") as out:
                  out.write("## AI Code Review\n\nNo diff detected against the base branch — nothing to review.\n")
              sys.exit(0)

          system_prompt = (
              "You are an experienced senior software engineer performing a code review. "
              "Review the provided unified diff. Focus on correctness, security, performance, "
              "readability, edge cases, and maintainability. Be concise and specific. "
              "Reference file paths and line numbers when relevant. Use Markdown."
          )

          user_prompt = (
              "Please review the following pull request diff and provide actionable feedback. "
              "Organize findings by severity (Critical / Major / Minor / Nit). "
              "If the change looks good overall, say so explicitly.\n\n"
              "```diff\n" + diff + "\n```"
          )

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": user_prompt},
              ],
              "temperature": 0.2,
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  body = resp.read().decode("utf-8")
          except urllib.error.HTTPError as e:
              err_body = e.read().decode("utf-8", errors="replace")
              print(f"API HTTP error {e.code}: {err_body}", file=sys.stderr)
              sys.exit(1)
          except urllib.error.URLError as e:
              print(f"API URL error: {e}", file=sys.stderr)
              sys.exit(1)

          data = json.loads(body)
          try:
              content = data["choices"][0]["message"]["content"].strip()
          except (KeyError, IndexError):
              print(f"Unexpected API response: {body}", file=sys.stderr)
              sys.exit(1)

          header = "## AI Code Review\n\n"
          footer = ""
          if truncated:
              footer = f"\n\n---\n_Note: the diff was truncated to {MAX_DIFF_CHARS} characters before review._"

          with open("/tmp/review.md", "w", encoding="utf-8") as out:
              out.write(header + content + footer + "\n")

          print("Review written to /tmp/review.md")
          PY

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/review.md
