name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_diff.txt

      - name: AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat pr_diff.txt | head -c 12000)

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n \
              --arg diff "$DIFF" \
              '{model: "gpt-4o", max_tokens: 1500, messages: [{role: "system", content: "You are an expert code reviewer. Review the following PR diff and provide concise, constructive feedback. Focus on: bugs, security issues, performance, code style, and best practices. Format your response in markdown with clear sections."}, {role: "user", content: ("Please review this PR diff:\n\n" + $diff)}]}')")

          COMMENT=$(echo $RESPONSE | jq -r '.choices[0].message.content')

          gh pr comment $PR_NUMBER \
            --repo $REPO \
            --body "## Robot AI Code Review (GPT-4o)\n\n$COMMENT\n\n---\n*This review was generated automatically by GPT-4o.*"
