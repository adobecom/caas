name: Agent QA Review

# Advisory, non-blocking. Builds the PR's CaaS bundle, injects it into the live
# business.adobe.com collection page on a self-hosted runner with a persistent
# real Chrome (CDP), screenshots PR vs stable, pixel-diffs, and has a Claude
# judge post a perceptual-review comment. Deterministic gates (unit/WDIO/pa11y)
# live in the existing Pull Request workflow; this only ever comments.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (leave blank to backfill ALL open PRs)'
        required: false
        type: string

concurrency:
  group: agent-qa-${{ github.event.pull_request.number || inputs.pr_number || 'all' }}
  cancel-in-progress: true

jobs:
  agent-review:
    runs-on: [self-hosted, qa-audit]   # the Mini — only runner with the persistent Chrome/CDP
    timeout-minutes: 20
    # Same-repo PRs only (public repo + self-hosted runner); manual dispatch always allowed.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build the PR's CaaS dist
        run: |
          npm ci
          NODE_OPTIONS=--openssl-legacy-provider npm run build

      - name: Install agent-review deps
        working-directory: .github/qa
        run: npm ci

      - name: Run agent QA review
        working-directory: .github/qa
        env:
          GH_REPO: ${{ github.repository }}
          DIST_DIR: ${{ github.workspace }}/dist
          CDP_URL: http://127.0.0.1:9222
          IMS_ACCESS_TOKEN: ${{ secrets.IMS_ACCESS_TOKEN }}
          PROXY_URL: ${{ secrets.LLM_PROXY_ENDPOINT }}
          MODEL: ${{ secrets.LLM_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          INPUT_PR: ${{ inputs.pr_number }}
        run: |
          PRS="${EVENT_PR:-$INPUT_PR}"
          # workflow_dispatch with no number => backfill every open PR
          if [ -z "$PRS" ]; then
            PRS=$(gh pr list -R "$GH_REPO" --state open --json number --jq '.[].number')
          fi
          echo "Reviewing PR(s): $PRS"
          for n in $PRS; do
            echo "::group::PR #$n"
            PR_NUMBER="$n" OUT_DIR="agent-review-out/pr-$n" node agent-review.mjs || echo "PR #$n review failed (non-blocking)"
            echo "::endgroup::"
          done

      - name: Log agent review failure to the monitor issue
        if: always()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('AGENT_REVIEW_FAILED')) { core.info('Agent QA Review OK; nothing to log.'); return; }
            const reason = fs.readFileSync('AGENT_REVIEW_FAILED', 'utf8').trim();
            const { owner, repo } = context.repo;
            const title = 'CI: AI / Agent review tool failures';
            // Find the ONE monitor issue whether open OR closed, so we never create duplicates.
            const sr = await github.rest.search.issuesAndPullRequests({ q: `repo:${owner}/${repo} is:issue in:title "${title}"`, per_page: 10 });
            let issue = (sr.data.items || []).find(i => i.title === title);
            let notify = false;
            if (!issue) {
              const res = await github.rest.issues.create({ owner, repo, title, body: 'Automated log of AI Code Review / Agent QA Review TOOL failures (upstream / CDP / stream errors, not code regressions). Each comment is one failed run; the PR check stays green. You are @-mentioned only when a new failure streak begins; CLOSE this issue once handled to re-arm the alert.' });
              issue = res.data; notify = true;            // first failure ever -> mention
            } else if (issue.state === 'closed') {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'open' });
              notify = true;                              // failures resumed after you closed it -> mention
            }                                             // already open -> log silently, no new email
            const cc = '\n\ncc @sanrai';   // mention on every failure -> a notification each time
            const body = ['❌ **Agent QA Review** could not run — ' + new Date().toISOString(), '', reason.startsWith('PR') ? reason : '- ' + reason, '- Run: ' + process.env.RUN_URL, cc].join('\n');
            await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body });
            core.info('Logged' + ' Agent QA Review failure on issue #' + issue.number);

      - name: Upload screenshots + diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-review-${{ github.run_id }}
          path: .github/qa/agent-review-out/
          retention-days: 14
