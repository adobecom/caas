name: Bulk Publisher E2E (scheduled)
on:
  schedule:
    - cron: '0 8 * * 1-5'  # 8am UTC, weekdays
  workflow_dispatch:

jobs:
  run-bulk-publisher-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          # Pinned to Chrome 146 to match the chromedriver@^146.0.5 version in
          # package.json. This avoids the failure mode where Chrome auto-updates
          # past the chromedriver npm wrapper's Node-version support window:
          # chromedriver@147+ requires Node >=20 (via ESM-only proxy-agent@8),
          # which breaks on the Node 18 runner.
          chrome-version: '146'
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install
        run: npm ci
      - name: Run Bulk Publisher E2E Tests
        run: npm run test:bulk-publisher
        env:
          IMS_CLIENT_SECRET: ${{ secrets.IMS_CLIENT_SECRET }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Bulk Publisher E2E failed (${new Date().toISOString().split('T')[0]})`,
              body: `The scheduled Bulk Publisher E2E run failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['e2e-failure'],
            });
