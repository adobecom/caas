name: Review Score Gate

# Majority-vote merge gate for adobecom/caas.
# The JOB's own pass/fail IS the required check (mark "review-score-gate"
# required in the branch ruleset). No status-write token needed.
#
# Hardened: uses only the pre-installed `gh` CLI + node, no marketplace
# actions, so there is nothing to download (avoids transient codeload 429s
# that would otherwise flake a required check).
#
# Only usernames in ALLOWED_VOTERS count. Each voter's CURRENT stance is used:
# a later DISMISSED review clears an earlier vote; COMMENTED never clears one.
#
# NOTE: the pull_request_review trigger uses the workflow file from the
# DEFAULT branch, so this must be merged to main to react to approvals.

"on":
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read

jobs:
  review-score-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Review score gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cat > "$RUNNER_TEMP/review-score.js" <<'SCRIPT'
          const { execSync } = require('child_process');
          // ================= EDIT THIS LIST ==========================
          const ALLOWED_VOTERS = [
            'auniverseaway', 'chrischrischris', 'cmiqueo', 'honstar',
            'jedjedjedM', 'jenssingler', 'raissanjay', 'sanrai',
            'sheridansunier', 'shkhan91', 'sukamat',
          ];
          const REQUIRED_SCORE = 1;         // net (approvals - blocks) to merge
          const TIE_GOES_TO_APPROVE = true; // 1-vs-1 / 2-vs-2 passes if >=1 approval
          // ===========================================================
          const repo = process.env.REPO;
          const pr = process.env.PR_NUMBER;
          const author = (process.env.PR_AUTHOR || '').toLowerCase();
          if (!pr) { console.log('no pull_request context; skipping'); process.exit(0); }
          const voters = new Set(ALLOWED_VOTERS.map(function (s) { return s.toLowerCase(); }));
          const raw = execSync('gh api "repos/' + repo + '/pulls/' + pr + '/reviews?per_page=100" --paginate',
            { encoding: 'utf8', maxBuffer: 64 * 1024 * 1024 });
          const reviews = JSON.parse(raw);
          // Chronological. Track each voter's current effective stance.
          const latest = new Map();
          for (const r of reviews) {
            const l = ((r.user && r.user.login) || '').toLowerCase();
            if (!l || l === author || !voters.has(l)) continue;
            if (r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED') latest.set(l, r.state);
            else if (r.state === 'DISMISSED') latest.delete(l);
          }
          let a = 0, b = 0;
          for (const s of latest.values()) { if (s === 'APPROVED') a++; else b++; }
          const score = a - b;
          const pass = score >= REQUIRED_SCORE || (TIE_GOES_TO_APPROVE && a >= 1 && score === 0);
          console.log('score ' + score + ' (' + a + ' approve, ' + b + ' block) from allowlisted voters, need >= ' + REQUIRED_SCORE);
          if (!pass) { console.error('BLOCKED: review score below threshold'); process.exit(1); }
          console.log('PASS');
          SCRIPT
          node "$RUNNER_TEMP/review-score.js"
