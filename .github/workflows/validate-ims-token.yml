name: Validate IMS Token

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check token
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.LLM_PROXY_URL }}/v1/messages" \
            -H "Authorization: Bearer ${{ secrets.IMS_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d "{\"model\":\"${{ secrets.LLM_MODEL }}\",\"max_tokens\":5,\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}")

          if [ "$STATUS" = "200" ]; then
            echo "Token OK (HTTP 200)"
          else
            echo "Token FAILED (HTTP $STATUS)"
            exit 1
          fi
