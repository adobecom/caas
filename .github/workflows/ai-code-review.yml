name: AI Code Review

on:
  # Automatic: fires on every PR open, new commit, or reopen
  pull_request:
    types: [opened, synchronize, reopened]
  # On-demand: comment "@claude" on any open PR to trigger a review
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    # For comment triggers: only run on PR comments (not plain issues) that mention @claude
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    env:
      ANTHROPIC_BASE_URL: https://adobe-llm-proxy.paolo-moz.workers.dev
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.IMS_ACCESS_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Review this pull request. Focus only on critical, high-confidence issues:
            correctness bugs, security vulnerabilities, data loss, broken logic,
            race conditions. Do not comment on style, formatting, or minor nits.
            Post each finding as an inline comment on the specific changed line.
            If there are no critical issues, post one short summary comment saying the PR looks clean.
