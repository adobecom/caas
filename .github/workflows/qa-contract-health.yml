name: QA Contract Catalog Health

# Read-only weekly maintenance: detect missing catalog source hints and source
# tokens that drifted on current main. It never edits a contract or a product
# PR; a QA owner reviews and back-tests any proposal in a separate contract PR.
on:
  schedule:
    - cron: '17 15 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Validate QA fixture contract catalog against current source
        run: node .github/qa/contract-maker.mjs health --repo-root .
