version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"

    # Schedule: Only Mondays at 9am Pacific (not constantly!)
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"

    # Limit: Max 5 open PRs at once (prevents overwhelming flood)
    open-pull-requests-limit: 5

    # Group minor/patch updates into a few weekly PRs
    groups:
      # Production/runtime deps
      prod-version:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"

      # Build toolchain deps
      build-version:
        dependency-type: development
        patterns:
          - "webpack*"
          - "*-loader"
          - "*-plugin"
          - "babel*"
          - "@babel/*"
          - "postcss*"
          - "less*"
          - "style-loader"
          - "css-loader"
          - "copy-webpack-plugin"
          - "uglifyjs-webpack-plugin"
          - "webpack-bundle-analyzer"
        update-types:
          - "minor"
          - "patch"

      # Test, lint, QA, and other dev tooling
      test-quality-version:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "webpack*"
          - "*-loader"
          - "*-plugin"
          - "babel*"
          - "@babel/*"
          - "postcss*"
          - "less*"
          - "style-loader"
          - "css-loader"
          - "copy-webpack-plugin"
          - "uglifyjs-webpack-plugin"
          - "webpack-bundle-analyzer"
        update-types:
          - "minor"
          - "patch"

      # One PR for all security updates
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    # Safety: Ignore major version bumps (too risky to auto-update)
    # We'll handle React 16→18, Webpack 3→5 manually
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
