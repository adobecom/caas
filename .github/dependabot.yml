version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"

    # Schedule: Only Mondays at 9am Pacific (not constantly!)
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"

    # Limit: Max 5 open PRs at once (prevents overwhelming flood)
    open-pull-requests-limit: 5

    # Group minor/patch updates into a single weekly PR
    groups:
      # One PR for all version updates
      all-version-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # One PR for all security updates
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    # Safety: Ignore major version bumps (too risky to auto-update)
    # We'll handle React 16→18, Webpack 3→5 manually
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
